# New-API local development Docker Compose configuration
#
# Usage:
#   docker compose -f docker-compose-dev.yml up -d --build
#   docker compose -f docker-compose-dev.yml logs -f new-api-dev
#   docker compose -f docker-compose-dev.yml down
#
# Access:
#   http://localhost:3001

version: '3.4'

services:
  new-api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api-local:dev
    container_name: new-api-dev
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "3001:3000"
    volumes:
      - ./data-dev:/data
      - ./logs-dev:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres-dev:5432/new-api
      - REDIS_CONN_STRING=redis://redis-dev
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_TYPE=master
      - SESSION_SECRET=new-api-local-dev-session-secret-2026
      - CRYPTO_SECRET=new-api-local-dev-crypto-secret-2026
      - IMAGE_HANDLE_BASE_URL=http://image-api:8787
      - IMAGE_HANDLE_API_KEY=local-image-handle-api-key
      - IMAGE_HANDLE_INTERNAL_BASE_URL=http://new-api-dev:3000
      - IMAGE_HANDLE_INTERNAL_SECRET_ID=image_handle_1
      - IMAGE_HANDLE_INTERNAL_SECRET=local-image-handle-lease-secret
      - IMAGE_HANDLE_CALLBACK_SECRET=local-image-handle-callback-secret
      - WEBHOOK_ALLOW_INSECURE_LOCAL=true
    depends_on:
      - redis-dev
      - postgres-dev
    networks:
      - new-api-dev-network
      - ai-gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-dev:
    image: redis:latest
    container_name: redis-dev
    restart: unless-stopped
    networks:
      - new-api-dev-network

  postgres-dev:
    image: postgres:15
    container_name: postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    networks:
      - new-api-dev-network

  async-test-mock:
    profiles:
      - async-test
    build:
      context: ./test/asyncmock
      dockerfile: Dockerfile
    image: new-api-async-test-mock:dev
    container_name: async-test-mock
    restart: unless-stopped
    ports:
      - "18081:8080"
    environment:
      - PORT=8080
    networks:
      - new-api-dev-network
    healthcheck:
      test: ["CMD", "/async-test-mock", "-healthcheck", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data_dev:

networks:
  new-api-dev-network:
    driver: bridge
  ai-gateway:
    external: true
    name: ai-gateway
